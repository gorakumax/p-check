<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備点検（ステップ入力版）</title>
<!-- <head> 内、<title> の下あたりに追加 -->
<link rel="stylesheet" href="luminous-basic.min.css">
<script src="Luminous.min.js"></script>

    <!-- マニフェストの読み込み -->
<link rel="manifest" href="manifest.json">

<!-- サービスワーカーの登録 -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; font-size: 1.2em; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        
        /* ステップ制御用 */
        .step { display: none; }
        .step.active { display: block; }

        /* 画像表示スペース */
        .guide-image { width: 100%; max-height: 250px; background-color: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; color: #888; overflow: hidden; border: 1px dashed #ccc; }
        .guide-image img { width: 100%; height: auto; object-fit: contain; }

        .section-title { background: #e8f0fe; padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 15px; color: #1967d2; }
        .item { margin-bottom: 15px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        label { display: block; font-weight: bold; font-size: 0.9em; margin-bottom: 5px; }
        input[type="number"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 18px; inputmode: decimal; box-sizing: border-box; }
        .radio-group { display: flex; gap: 30px; margin-top: 5px; }
        .radio-group label { display: flex; align-items: center; font-weight: normal; font-size: 1.1em; cursor: pointer; }
        input[type="radio"] { width: 22px; height: 22px; margin-right: 8px; }

        /* ボタン類 */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-next { background: #1a73e8; color: white; }
        .btn-prev { background: #ccc; color: #333; }
        .btn-submit { background: #27ae60; color: white; }
        button:disabled { opacity: 0.5; }
        .progress { text-align: center; font-size: 0.8em; color: #666; margin-top: 10px; }
.item { 
    clear: both; /* 前の項目の回り込みを確実にリセット */
    overflow: hidden; /* この項目内での回り込みを完結させる */
    margin-bottom: 20px; 
    border-bottom: 1px solid #eee; 
    padding-bottom: 15px; 
}

/* 点検ガイド用画像のスタイル */
.check-photo {
    float: left;
    margin-right: 12px;
    margin-bottom: 5px;
    width: 100px; /* スマホで見やすいサイズ */
}

.check-photo img {
    width: 100%;
    height: auto;
    border-radius: 6px;
    border: 1px solid #ddd;
}

/* 補足説明テキスト */
.memo {
    font-size: 0.85em;
    color: #666;
    line-height: 1.4;
    margin-top: 0;
}
    </style>

</head>
<body>

<div class="container">
    <h1>ポンプ場点検</h1>
    <form id="inspectionForm">

<!-- STEP 1: 電気系統 -->
<div class="step active" id="step1">
    <div class="section-title">【1/6】電気系統（1～6）</div>
    
    <!-- 1. 受電電圧計 -->
    <div class="item">
        <label>1. 受電電圧計</label>
        <a href="img/002-3.webp" class="zoom check-photo">
            <img src="img/002-4.webp" alt="受電電圧計の見本">
        </a>
        <p class="memo">
            赤色の指針が<b>6600V</b>付近を指しているか確認。タップで拡大。
        </p>
        <input type="number" name="item1" step="any" placeholder="V">
    </div>

    <!-- 2. 二次電圧計 -->
    <div class="item">
        <label>2. 二次電圧計</label>
        <a href="img/002-1.webp" class="zoom check-photo">
            <img src="img/002-2.webp" alt="二次電圧計の見本">
        </a>
        <p class="memo">
            低圧盤の電圧計を確認。通常は<b>210V</b>前後です。
        </p>
        <input type="number" name="item2" step="any" placeholder="V">
    </div>

    <!-- 3番以降は元のスタイルのままでも、順次上記に書き換えてもOK -->
<div class="item"><label>3. 主ポンプ電圧計</label><input type="number" name="item3" step="any"></div>
            <div class="item"><label>4. 水中ポンプ電流計</label><input type="number" name="item4" step="any"></div>
            <div class="item"><label>5. 800φ運転時間</label><input type="number" name="item5" step="any"></div>
            <div class="item"><label>6. ランプテスト</label><div class="radio-group"><label><input type="radio" name="item6" value="可" checked>可</label><label><input type="radio" name="item6" value="否">否</label></div></div>

    <div class="btn-group">
        <button type="button" class="btn-next" onclick="nextStep(2)">次へ ＞</button>
    </div>
</div>


        <!-- STEP 2: 燃料・圧縮機 -->
        <div class="step" id="step2">
            <div class="section-title">【2/6】燃料・圧縮機（7～14）</div>
            <div class="guide-image">画像エリア：コンプレッサー・燃料計</div>
            <div class="item"><label>7. コンプレッサー電流</label><input type="number" name="item7" step="any"></div>
            <div class="item"><label>8. 運転状態</label><div class="radio-group"><label><input type="radio" name="item8" value="可" checked>可</label><label><input type="radio" name="item8" value="否">否</label></div></div>
            <div class="item"><label>9. 燃料移送１号電流</label><input type="number" name="item9" step="any"></div>
            <div class="item"><label>10. 運転状態</label><div class="radio-group"><label><input type="radio" name="item10" value="可" checked>可</label><label><input type="radio" name="item10" value="否">否</label></div></div>
            <div class="item"><label>11. 燃料移送２号電流</label><input type="number" name="item11" step="any"></div>
            <div class="item"><label>12. 運転状態</label><div class="radio-group"><label><input type="radio" name="item12" value="可" checked>可</label><label><input type="radio" name="item12" value="否">否</label></div></div>
            <div class="item"><label>13. ランプテスト</label><div class="radio-group"><label><input type="radio" name="item13" value="可" checked>可</label><label><input type="radio" name="item13" value="否">否</label></div></div>
            <div class="item"><label>14. 小出槽残量</label><input type="number" name="item14" step="any"></div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="nextStep(1)">＜ 戻る</button>
                <button type="button" class="btn-next" onclick="nextStep(3)">次へ ＞</button>
            </div>
        </div>

        <!-- STEP 3: エンジン詳細 -->
        <div class="step" id="step3">
            <div class="section-title">【3/6】エンジン・減速機（15～24）</div>
            <div class="guide-image">画像エリア：オイルゲージ・潤滑ポンプ</div>
            <div class="item"><label>15. エンジンオイル量</label><div class="radio-group"><label><input type="radio" name="item15" value="可" checked>可</label><label><input type="radio" name="item15" value="否">否</label></div></div>
            <div class="item"><label>16. 冷却水量</label><div class="radio-group"><label><input type="radio" name="item16" value="可" checked>可</label><label><input type="radio" name="item16" value="否">否</label></div></div>
            <div class="item"><label>17. エンジン潤滑ポンプ</label><input type="number" name="item17" step="any"></div>
            <div class="item"><label>18. 運転状態</label><div class="radio-group"><label><input type="radio" name="item18" value="可" checked>可</label><label><input type="radio" name="item18" value="否">否</label></div></div>
            <div class="item"><label>19. 減速機潤滑ポンプ</label><input type="number" name="item19" step="any"></div>
            <div class="item"><label>20. 運転状態</label><div class="radio-group"><label><input type="radio" name="item20" value="可" checked>可</label><label><input type="radio" name="item20" value="否">否</label></div></div>
            <div class="item"><label>21. 減速機CLF</label><input type="number" name="item21" step="any"></div>
            <div class="item"><label>22. 運転状態</label><div class="radio-group"><label><input type="radio" name="item22" value="可" checked>可</label><label><input type="radio" name="item22" value="否">否</label></div></div>
            <div class="item"><label>23. 逆転機CLF</label><input type="number" name="item23" step="any"></div>
            <div class="item"><label>24. 運転状態</label><div class="radio-group"><label><input type="radio" name="item24" value="可" checked>可</label><label><input type="radio" name="item24" value="否">否</label></div></div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="nextStep(2)">＜ 戻る</button>
                <button type="button" class="btn-next" onclick="nextStep(4)">次へ ＞</button>
            </div>
        </div>

        <!-- STEP 4: 運転計測 -->
        <div class="step" id="step4">
            <div class="section-title">【4/6】運転計測（25～30）</div>
            <div class="guide-image">画像エリア：エンジン回転計・圧力計</div>
            <div class="item"><label>25. エンジン回転数</label><input type="number" name="item25" step="any"></div>
            <div class="item"><label>26. 油圧</label><input type="number" name="item26" step="any"></div>
            <div class="item"><label>27. 水圧</label><input type="number" name="item27" step="any"></div>
            <div class="item"><label>28. エンジン運転時間</label><input type="number" name="item28" step="any"></div>
            <div class="item"><label>29. 運転状態</label><div class="radio-group"><label><input type="radio" name="item29" value="可" checked>可</label><label><input type="radio" name="item29" value="否">否</label></div></div>
            <div class="item"><label>30. ランプテスト</label><div class="radio-group"><label><input type="radio" name="item30" value="可" checked>可</label><label><input type="radio" name="item30" value="否">否</label></div></div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="nextStep(3)">＜ 戻る</button>
                <button type="button" class="btn-next" onclick="nextStep(5)">次へ ＞</button>
            </div>
        </div>

        <!-- STEP 5: 建物・外灯・除塵 -->
        <div class="step" id="step5">
            <div class="section-title">【5/6】建物・除塵（31～39）</div>
            <div class="guide-image">画像エリア：除塵機・照明スイッチ盤</div>
            <div class="item"><label>31. バッテリー液</label><div class="radio-group"><label><input type="radio" name="item31" value="可" checked>可</label><label><input type="radio" name="item31" value="否">否</label></div></div>
            <div class="item"><label>32. 建物東西ファン</label><div class="radio-group"><label><input type="radio" name="item32" value="可" checked>可</label><label><input type="radio" name="item32" value="否">否</label></div></div>
            <div class="item"><label>33. 室内灯</label><div class="radio-group"><label><input type="radio" name="item33" value="可" checked>可</label><label><input type="radio" name="item33" value="否">否</label></div></div>
            <div class="item"><label>34. 外灯</label><div class="radio-group"><label><input type="radio" name="item34" value="可" checked>可</label><label><input type="radio" name="item34" value="否">否</label></div></div>
            <div class="item"><label>35. 除塵機電流</label><input type="number" name="item35" step="any"></div>
            <div class="item"><label>36. 運転状態</label><div class="radio-group"><label><input type="radio" name="item36" value="可" checked>可</label><label><input type="radio" name="item36" value="否">否</label></div></div>
            <div class="item"><label>37. 照明</label><div class="radio-group"><label><input type="radio" name="item37" value="可" checked>可</label><label><input type="radio" name="item37" value="否">否</label></div></div>
            <div class="item"><label>38. スクリーン清掃</label><div class="radio-group"><label><input type="radio" name="item38" value="可" checked>可</label><label><input type="radio" name="item38" value="否">否</label></div></div>
            <div class="item"><label>39. 南外灯</label><div class="radio-group"><label><input type="radio" name="item39" value="可" checked>可</label><label><input type="radio" name="item39" value="否">否</label></div></div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="nextStep(4)">＜ 戻る</button>
                <button type="button" class="btn-next" onclick="nextStep(6)">次へ ＞</button>
            </div>
        </div>

        <!-- STEP 6: 検針・最終確認 -->
        <div class="step" id="step6">
            <div class="section-title">【6/6】検針・最終確認（40～46）</div>
            <div class="guide-image">画像エリア：メーター類（電力・水道）</div>
            <div class="item"><label>40. 電力使用量</label><input type="number" name="item40" step="any"></div>
            <div class="item"><label>41. 水道使用量</label><input type="number" name="item41" step="any"></div>
            <div class="item"><label>42. 重油残量</label><input type="number" name="item42" step="any"></div>
            <div class="item"><label>43. 燃料防油堤排水</label><div class="radio-group"><label><input type="radio" name="item43" value="可" checked>可</label><label><input type="radio" name="item43" value="否">否</label></div></div>
            <div class="item"><label>44. 燃料配管漏れ</label><div class="radio-group"><label><input type="radio" name="item44" value="可" checked>可</label><label><input type="radio" name="item44" value="否">否</label></div></div>
            <div class="item"><label>45. 吐出弁600φ</label><div class="radio-group"><label><input type="radio" name="item45" value="可" checked>可</label><label><input type="radio" name="item45" value="否">否</label></div></div>
            <div class="item"><label>46. 吐出弁800φ</label><div class="radio-group"><label><input type="radio" name="item46" value="可" checked>可</label><label><input type="radio" name="item46" value="否">否</label></div></div>
            <div class="item"><label>47. 警報等</label><div class="radio-group"><label><input type="radio" name="item47" value="可" checked>可</label><label><input type="radio" name="item47" value="否">否</label></div></div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="nextStep(5)">＜ 戻る</button>
                <button type="submit" class="btn-submit" id="submitBtn">全て送信する</button>
            </div>
        </div>

        <div class="progress" id="progressText">STEP 1 / 6</div>
    </form>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxAghHtkPUUwT7Yzbubjn-xbJk1S0exrYgfYJNbMiiYONXUn22bEyrlVLpErU1-6JE7/exec";
    const FORM_ID = 'inspectionForm';
    const DRAFT_KEY = 'inspection_draft';

    // --- 1. ステップ切り替え関数 ---
    function nextStep(stepNumber) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        const targetStep = document.getElementById('step' + stepNumber);
        if (targetStep) {
            targetStep.classList.add('active');
            document.getElementById('progressText').innerText = 'STEP ' + stepNumber + ' / 6';
            window.scrollTo(0, 0);
        }
    }

    // --- 2. 自動保存機能 (入力のたびに実行) ---
    document.getElementById(FORM_ID).addEventListener('input', () => {
        const formData = new FormData(document.getElementById(FORM_ID));
        const data = Object.fromEntries(formData.entries());
        localStorage.setItem(DRAFT_KEY, JSON.stringify(data));
    });

    // --- 3. 復元機能 (ページ読み込み時に実行) ---
    window.addEventListener('load', () => {
        const savedData = localStorage.getItem(DRAFT_KEY);
        if (savedData) {
            const data = JSON.parse(savedData);
            Object.keys(data).forEach(key => {
                const elements = document.getElementsByName(key);
                if (elements.length > 0) {
                    if (elements[0].type === 'radio') {
                        // ラジオボタンの復元
                        Array.from(elements).forEach(el => {
                            if (el.value === data[key]) el.checked = true;
                        });
                    } else {
                        // 数値・テキストの復元
                        elements[0].value = data[key];
                    }
                }
            });
            console.log("下書きからデータを復元しました。");
        }
    });

    // --- 4. 送信処理 ---
    document.getElementById(FORM_ID).addEventListener('submit', function(e) {
        e.preventDefault();
        
        // オンラインチェック
        if (!navigator.onLine) {
            alert("現在はオフラインです。電波の良い場所へ移動してから送信してください。入力内容は保持されています。");
            return;
        }

        if(!confirm("全てのデータを送信します。よろしいですか？")) return;

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "送信中...";

        fetch(GAS_URL, {
            method: "POST",
            body: new URLSearchParams(new FormData(this)),
            mode: "no-cors"
        }).then(() => {
            alert("送信完了しました！お疲れ様でした。");
            // 送信成功時のみ下書きを削除
            localStorage.removeItem(DRAFT_KEY);
            location.reload();
        }).catch(err => {
            alert("エラーが発生しました: " + err);
            btn.disabled = false;
            btn.innerText = "全て送信する";
        });
    });
</script>
</body>
</html>
